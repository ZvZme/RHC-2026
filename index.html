};

const updDate = (i, val) => {

};

const updPayAmt = (pid, pi, val) => {

…p,
payments: p.payments.map((pay, i) => i !== pi ? pay : { …pay, amount: val })
}));
};

const togglePaid = (pid, pi) => {

…p,
payments: p.payments.map((pay, i) => i !== pi ? pay : { …pay, paid: !pay.paid })
}));
};

const renamePlayer = (id, name) => {

setEditName(null);

                <div style={{ display: "flex", gap: "20px" }}>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: "10px", color: "#8a9a8a", textTransform: "uppercase", letterSpacing: "1px" }}>Collected</div>
                    <div style={{ fontFamily: "monospace", fontSize: "14px", color: team.color }}>{rnd(teamCollected)}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: "10px", color: "#8a9a8a", textTransform: "uppercase", letterSpacing: "1px" }}>Fully paid</div>
                    <div style={{ fontFamily: "monospace", fontSize: "14px", color: team.color }}>{teamFullyPaid} / 10</div>
                  </div>
                </div>
              </div>

              {/* Players */}
              <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                {teamPlayers.map(function(player) {
                  const allPaid = player.payments.every(function(p) { return p.paid; });
                  const somePaid = player.payments.some(function(p) { return p.paid; });
                  const playerCollected = player.payments.reduce(function(s, p) { return s + (p.paid && p.amount !== "" ? Number(p.amount) : 0); }, 0);
                  const playerExpected = player.payments.reduce(function(s, p) { return s + (p.amount !== "" ? Number(p.amount) : 0); }, 0);
                  const dotColor = allPaid ? "#4ade80" : somePaid ? "#facc15" : "#3a5a3a";

                  return (
                    <div key={player.id} style={{ background: "#0d1a0d", border: "1px solid " + (allPaid ? team.borderColor : "#2a3a2a"), borderRadius: "10px", padding: "14px 16px" }}>
                      {/* Name row */}
                      <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "12px" }}>
                        <div style={{ width: "9px", height: "9px", borderRadius: "50%", background: dotColor, flexShrink: 0 }} />
                        {editName === player.id ? (
                          <input
                            autoFocus type="text" defaultValue={player.name}
                            onBlur={function(e) { renamePlayer(player.id, e.target.value); }}
                            onKeyDown={function(e) { if (e.key === "Enter") e.target.blur(); }}
                            style={{ ...IS, fontSize: "14px", flex: 1 }}
                          />
                        ) : (
                          <div onClick={() => setEditName(player.id)} title="Click to rename"
                            style={{ fontSize: "14px", fontWeight: "bold", color: allPaid ? "#8ade60" : "#c0d8a0", cursor: "text", flex: 1 }}>
                            {player.name}
                          </div>
                        )}
                        <div style={{ fontFamily: "monospace", fontSize: "12px", color: "#6a8a5a", whiteSpace: "nowrap" }}>
                          {rnd(playerCollected)} / {playerExpected ? rnd(playerExpected) : "TBC"}
                        </div>
                      </div>

                      {/* 3 payment slots */}
                      <div className="pay-grid" style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: "8px" }}>
                        {player.payments.map(function(pay, i) { return (
                          <div key={i} style={{ background: pay.paid ? "#0a1f0a" : "#0a120a", border: "1px solid " + (pay.paid ? team.borderColor : "#1a2a1a"), borderRadius: "7px", padding: "10px" }}>
                            <div style={{ fontSize: "10px", color: pay.paid ? team.color : "#6a9a4a", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "8px" }}>
                              {payLabels[i]}
                            </div>
                            <div style={{ display: "flex", alignItems: "center", gap: "4px", marginBottom: "6px" }}>
                              <span style={{ fontSize: "11px", color: "#5a7a5a", fontFamily: "monospace" }}>R</span>
                              <input
                                type="number"
                                value={pay.amount}
                                onChange={function(e) { updPayAmt(player.id, i, e.target.value); }}
                                style={{ ...IS, padding: "4px 6px", fontSize: "13px" }}
                                placeholder="TBC"
                              />
                            </div>
                            {payDates[i] && (
                              <div style={{ fontSize: "10px", color: "#4a6a4a", marginBottom: "6px", fontFamily: "monospace" }}>
                                Due: {fmtDate(payDates[i])}
                              </div>
                            )}
                            <button
                              onClick={function() { togglePaid(player.id, i); }}
                              style={{
                                width: "100%", padding: "6px 0", borderRadius: "5px", cursor: "pointer",
                                border: "1px solid " + (pay.paid ? team.color : "#2a4a2a"),
                                background: pay.paid ? (team.id === "blue" ? "#1a2a4a" : "#4a1a1a") : "transparent",
                                color: pay.paid ? team.color : "#5a7a5a",
                                fontSize: "11px", fontFamily: "monospace", transition: "all 0.2s",
                              }}
                            >{pay.paid ? "✓  Paid" : "Mark paid"}</button>
                          </div>
                        ); })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
        <p style={{ fontSize: "11px", color: "#4a6a4a", marginTop: "14px" }}>
          Set labels and due dates at the top. Click a player name to rename. Enter amounts per slot as confirmed.
        </p>
      </div>
    )}

    {/* SUMMARY TAB */}
    {tab === "summary" && (
      <div style={{ padding: "24px 0" }}>
        <div style={{ background: "#0d1a0d", border: "1px solid #2a3a2a", borderRadius: "10px", overflow: "hidden" }}>
          <div style={{ background: "#142014", padding: "16px 20px", borderBottom: "1px solid #2a3a2a" }}>
            <span style={{ fontSize: "15px", color: "#c0d8a0" }}>Trip Summary — Nelspruit Golf 2026</span>
          </div>
          <div style={{ padding: "20px" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "monospace", fontSize: "13px" }}>
              <thead>
                <tr style={{ color: "#5a7a5a", fontSize: "10px", textTransform: "uppercase", letterSpacing: "1px" }}>
                  <th style={{ textAlign: "left", padding: "6px 8px", fontWeight: "normal" }}>Category</th>
                  <th style={{ textAlign: "right", padding: "6px 8px", fontWeight: "normal" }}>Est. pp</th>
                  <th style={{ textAlign: "right", padding: "6px 8px", fontWeight: "normal" }}>Actual pp</th>
                  <th style={{ textAlign: "right", padding: "6px 8px", fontWeight: "normal" }}>Group (x20)</th>
                </tr>
              </thead>
              <tbody>
                {cats.map(function(cat) {
                  const est = cat.items.reduce((s, i) => s + (i.est || 0), 0);
                  const act = cat.items.reduce((s, i) => s + effPP(i), 0);
                  return (
                    <tr key={cat.id} style={{ borderTop: "1px solid #1a2a1a" }}>
                      <td style={{ padding: "10px 8px", color: "#a0b890" }}>{cat.icon} {cat.label}</td>
                      <td style={{ padding: "10px 8px", textAlign: "right", color: "#6a8a5a" }}>{rnd(est)}</td>
                      <td style={{ padding: "10px 8px", textAlign: "right", color: "#c0d8a0" }}>{rnd(act)}</td>
                      <td style={{ padding: "10px 8px", textAlign: "right", color: "#8aaa6a" }}>{rnd(act * PEOPLE)}</td>
                    </tr>
                  );
                })}
                <tr style={{ borderTop: "2px solid #3a5a2a" }}>
                  <td style={{ padding: "14px 8px", color: "#c0d8a0", fontWeight: "bold" }}>TOTAL (excl. flights)</td>
                  <td style={{ padding: "14px 8px", textAlign: "right", color: "#6a8a5a", fontSize: "15px" }}>{rnd(totalEstPP)}</td>
                  <td style={{ padding: "14px 8px", textAlign: "right", color: bColor, fontSize: "17px" }}>{rnd(totalPP)}</td>
                  <td style={{ padding: "14px 8px", textAlign: "right", color: bColor, fontSize: "17px" }}>{rnd(totalPP * PEOPLE)}</td>
                </tr>
              </tbody>
            </table>

            <div style={{ marginTop: "20px", padding: "14px 16px", background: "#0a120a", borderRadius: "8px", border: "1px solid #2a3a2a" }}>
              <div style={{ fontSize: "11px", color: "#5a7a5a", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "10px" }}>Budget check</div>
              {[
                { label: "Under R10,000 pp", ok: totalPP < 10000, msg: totalPP < 10000 ? "Within minimum" : "Above minimum" },
                { label: "Under R12,000 pp", ok: totalPP <= 12000, msg: totalPP <= 12000 ? "Within maximum" : "Over budget" },
                { label: (totalPP <= MAX_PP ? "Headroom" : "Overspend") + " vs R12,000", ok: totalPP <= MAX_PP, msg: "R " + Math.abs(MAX_PP - totalPP).toLocaleString("en-ZA") + " pp" },
              ].map(function(c) { return (
                <div key={c.label} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #1a2a1a", fontSize: "13px" }}>
                  <span style={{ color: "#7a9a6a" }}>{c.label}</span>
                  <span style={{ color: c.ok ? "#4ade80" : "#f87171" }}>{c.msg}</span>
                </div>
              ); })}
            </div>

            <div style={{ marginTop: "16px", padding: "14px 16px", background: "#0a120a", borderRadius: "8px", border: "1px solid #1a3a1a" }}>
              <div style={{ fontSize: "11px", color: "#5a7a5a", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "10px" }}>Itinerary</div>
              {[
                { day: "Wed 21 Oct", plan: "Fly in (MQP) — Game drive" },
                { day: "Thu 22 Oct", plan: "White River CC — 10:15 tee-off" },
                { day: "Fri 23 Oct",  plan: "Kambaku Golf Club — 11:15 tee-off" },
                { day: "Sat 24 Oct",  plan: "Mbombela Golf Club — 11:15 tee-off" },
                { day: "Sun 25 Oct",  plan: "Check out — fly home" },
              ].map(function(r) { return (
                <div key={r.day} style={{ display: "flex", gap: "16px", padding: "6px 0", borderBottom: "1px solid #1a2a1a", fontSize: "13px" }}>
                  <span style={{ color: "#6a9a4a", fontFamily: "monospace", minWidth: "100px" }}>{r.day}</span>
                  <span style={{ color: "#a0b890" }}>{r.plan}</span>
                </div>
              ); })}
            </div>

            <div style={{ marginTop: "12px", padding: "12px 16px", background: "#0a120a", borderRadius: "8px", border: "1px solid #1a3a1a", fontSize: "12px", color: "#5a7a5a" }}>
              <strong style={{ color: "#6a9a5a" }}>Note:</strong> Flights excluded. Each player books their own flights to MQP (Kruger Mpumalanga International).
            </div>
          </div>
        </div>
      </div>
    )}
  </div>
  <div style={{ height: "48px" }} />
</div>
